<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TeleTV | HDO Box Core</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #loader { position: fixed; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99; }
        .progress-container { width: 360px; height: 6px; background: #222; border-radius: 10px; margin-top: 30px; }
        .progress-bar { width: 0%; height: 100%; background: #D4AF37; box-shadow: 0 0 15px #D4AF37; transition: width 0.2s; }
        #hdo-portal { width: 100%; height: 100%; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="loader">
        <img src="TeleTV_Logo.png" onerror="this.src='res/TeleTV_Logo.png'" style="width: 220px;">
        <div class="progress-container"><div id="fill" class="progress-bar"></div></div>
        <p id="load-text" style="color:#D4AF37; font-size:10px; margin-top:15px; letter-spacing:2px; text-transform: uppercase;">Mounting HDO_WEB_INTERFACE...</p>
    </div>

    <div id="hdo-portal">
        <iframe src="YOUR_HDO_WEB_SOURCE_HERE" allowfullscreen allow="autoplay"></iframe>
    </div>

    <script>
        if (sessionStorage.getItem('tele_auth') !== 'active') { window.location.href = "index.html"; }

        let p = 0;
        const fill = document.getElementById('fill');
        const boot = setInterval(() => {
            p += Math.floor(Math.random() * 5) + 1;
            if (p > 100) p = 100;
            fill.style.width = p + "%";
            if (p === 100) {
                clearInterval(boot);
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('hdo-portal').style.display = 'block';
                }, 1000);
            }
        }, 150);
    </script>
</body>
</html>
